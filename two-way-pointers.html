<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Two Way Linked Pointer</title>


	<style>
		* {
			box-sizing: border-box;
		}

		html {
			color-scheme: dark;
		}

		body {
			margin: 0;
		}

		main {
			display: grid;
			grid-template-columns: auto 1fr;
			padding: 0 2rem;
			block-size: 100vb;
		}

		aside, article {
			max-block-size: stretch;
			overflow-y: auto;
			scrollbar-gutter: stable;
			scrollbar-width: none;
			padding: 2rem;

			display: grid;
			gap: 1rem;
			align-content: start;
		}

		.card {
			width: 12rem;
			padding: 1rem;
			border-radius: 0.5rem;
			min-height: 16rem;
			background-color: #34363a;
			position: relative;
		}

		article section {
			min-height: 50vb;
			padding: 0.5rem;
			outline: 2px dashed #66696D;
		}

		.card.pointer {
			anchor-name: --active-pointer-card;
		}

		section.pointer {
			anchor-name: --active-pointer-section;
		}

		.card.pointer::after {
			content: "";
			position: absolute;
			width: 1rem;
			background-color: dodgerblue;
			height: 1rem;

			top: 0;
			bottom: anchor(top --active-pointer-section);
		}
	</style>

</head>
<body>

	<main>
		<aside>
			<div class="card">1</div>
			<div class="card">2</div>
			<div class="card pointer">3</div>
			<div class="card">4</div>
			<div class="card">5</div>
			<div class="card">6</div>
			<div class="card">7</div>
			<div class="card">8</div>
			<div class="card">9</div>
			<div class="card">10</div>
		</aside>

		<article>
			<section>1</section>
			<section>2</section>
			<section class="pointer">3</section>
			<section>4</section>
			<section>5</section>
		</article>
	</main>

</body>
</html>
