<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Password Toggle</title>

	<style>
		@import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap");

		:root,
		.dark {
			--main-bg: oklch(10% 0.024 250);
			--card-bg: oklch(21% 0.034 255);
			--bg-accent: oklch(27.8% 0.033 256.848);
			--accent: tomato;
			--h2-color: oklch(92.8% 0.006 264.531);
			--label-color: oklch(70.7% 0.022 261.325);
			--input-bg: oklch(from var(--main-bg) l c h / 0.5);
			--input-border: oklch(37.3% 0.034 259.733);
			--input-text: oklch(87.2% 0.01 258.338);
			--placeholder: oklch(55.1% 0.027 264.364);
			--tooltip-text: white;
			--font-stack: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color-scheme: dark;
		}

		/* Catppuccin Latte / light, print-friendly */
		.light {
			--main-bg: #ffffff;
			--card-bg: #f6f6f8;
			--bg-accent: #efecf4;
			--bg-accent-start: rgba(124, 124, 255, 0.06);
			--bg-accent-end: transparent;
			--accent: #7c7cff;
			--card-border: #e9e8ef;
			--button-bg: #fbfbfd;
			--button-border: #e6e6ea;
			--button-text: #1e1e2e;
			--button-hover-text: #ffffff;
			--h2-color: #1e1e2e;
			--label-color: #6b6b7c;
			--input-bg: rgba(30, 30, 46, 0.04);
			--input-border: #e6e6ea;
			--input-text: #1e1e2e;
			--placeholder: #8b8b9a;
			--tooltip-text: var(--input-text);
			--font-stack: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color-scheme: light;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: inherit;
			font-size: inherit;
		}

		body {
			margin: 0;
			background-color: var(--main-bg);
			overflow: hidden;
		}

		main {
			position: relative;
			isolation: isolate;

			min-block-size: 100svb;
			display: grid;
			place-content: center;
			grid-template-columns: 1fr;
			padding: 1rem;

			&::before {
				content: "";
				pointer-events: none;
				position: absolute;
				inset: 0;
				z-index: -1;
				background-image: radial-gradient(circle at 40% 40%, var(--bg-accent-start, var(--bg-accent)) 12%, var(--bg-accent-end, transparent) 40%);
				filter: blur(110px);
			}
		}

		button {
			border: none;
			border-radius: 0.17rem;
			cursor: pointer;
			color: var(--button-text, var(--accent));
			background-color: var(--button-bg, var(--bg-accent));
			color: var(--button-hover-text, var(--main-bg));
			background-color: var(--accent);
			border: 1px solid transparent;

			transition: opacity, color, background-color;
			transition-duration: 150ms;
			transition-timing-function: ease-in-out;

			&:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 2px;
			}

			&:focus-visible,
			&:hover {
				color: var(--button-text, var(--accent));
				background-color: var(--button-bg, var(--bg-accent));
				border-color: var(--accent);
			}
		}

		form {
			max-width: 28rem;
			width: stretch;
			margin-inline: auto;
			padding: 1rem 1.17rem;
			padding-block-end: 1.25rem;
			border-radius: 0.37rem;
			display: grid;
			gap: 1rem;
			border: 1px solid var(--card-border, var(--bg-accent));
			background-color: var(--card-bg);
		}

		form h2 {
			font-size: 1.5rem;
			color: var(--h2-color);
		}

		form .input-group {
			display: grid;
			gap: 0.3rem;
		}

		.pass-inp-wrapper {
			display: grid;
			position: relative;

			button.pass-toggle {
				cursor: pointer;

				opacity: 0;
				position: absolute;
				inset-block-start: 0.25em;
				inset-block-end: 0.25em;
				inset-inline-end: 0.25em;

				display: grid;
				place-content: center;
				aspect-ratio: 1 / 1;

				&>* {
					grid-column: 1 / -1;
					grid-row: 1 / -1;
				}
			}

			svg {
				width: 1.2em;
				height: 1.2em;
			}
		}

		.input-group:hover,
		.input-group:focus-within {
			.pass-toggle {
				opacity: 1;
			}
		}

		@media (hover: none) {
			.pass-inp-wrapper button.pass-toggle {
				opacity: 1;
			}
		}

		form label {
			color: var(--label-color);
			font-size: 1.07rem;
			font-weight: 500;
		}

		form input {
			height: 2.25rem;
			padding: 0.3rem 0.5rem;
			border-radius: 0.35rem;
			background-color: var(--input-bg);
			border: 1.5px solid var(--input-border);
			color: var(--input-text);
			font-weight: 500;

			&:focus-visible {
				outline: none;
				border-color: var(--accent);
			}

			&::placeholder {
				color: var(--placeholder);
			}
		}

		form button[type="submit"] {
			height: 2.25rem;
			font-weight: 900;
			font-size: 1.1rem;
			border-radius: 0.35rem;
		}

		.hidden {
			visibility: hidden;
		}

		[tooltip] {
			position: relative;

			&::before {
				pointer-events: none;
				content: attr(tooltip);
				position: absolute;

				bottom: calc(100% + 0.25em);
				left: 50%;
				color: var(--tooltip-text);
				background-color: var(--main-bg);
				border: 1px solid var(--card-bg);
				border-radius: 0.35rem;
				padding: 0.3rem 0.5rem;
				font-size: 0.93rem;

				width: max-content;
				max-width: 48ch;

				opacity: 0;
				transform: translateX(-50%) translateY(0.2em);
				transition: opacity, transform;
				transition-duration: 200ms;
				transition-timing-function: ease-in-out;
			}

			&:hover::before,
			&:focus-visible::before {
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}
		}
	</style>
</head>

<body>
	<main>
		<form action="javascript:;">
			<h2>Log In</h2>

			<div class="input-group">
				<label for="username">Username</label>
				<input type="text" name="username" id="username" placeholder="User123">
			</div>

			<div class="input-group">
				<label for="password">Password</label>

				<div class="pass-inp-wrapper">
					<input type="password" name="password" id="password" placeholder="******">

					<button type="button" class="pass-toggle" onclick="togglePasswordVisibility(this)"
						tooltip="Show Password">
						<svg class="icon-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path
								d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
							<circle cx="12" cy="12" r="3" />
						</svg>

						<svg class="icon-eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="m15 18-.722-3.25" />
							<path d="M2 8a10.645 10.645 0 0 0 20 0" />
							<path d="m20 15-1.726-2.05" />
							<path d="m4 15 1.726-2.05" />
							<path d="m9 18 .722-3.25" />
						</svg>
					</button>
				</div>
			</div>

			<button type="submit">Login</button>
		</form>
	</main>

	<script>
		function togglePasswordVisibility(btn) {
			const passInp = document.querySelector("input#password");
			const isHidden = passInp.getAttribute("type") === "password";

			const passInpWrapper = document.querySelector("form .pass-inp-wrapper");
			passInpWrapper.querySelectorAll(".hidden").forEach((el) => {
				el.classList.remove("hidden");
			});

			if (isHidden) {
				passInp.setAttribute("type", "text");
				passInpWrapper.querySelector(".icon-eye-open").classList.add("hidden");
				btn.setAttribute("tooltip", "Hide Password");
			} else {
				passInp.setAttribute("type", "password");
				passInpWrapper.querySelector(".icon-eye-closed").classList.add("hidden");
				btn.setAttribute("tooltip", "Show Password");
			}
		}
	</script>
</body>

</html>
